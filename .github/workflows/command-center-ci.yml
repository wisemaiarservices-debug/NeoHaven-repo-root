name: NOVA Command Center CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        working-directory: apps/command-center
        run: npm install
      - name: Typecheck
        working-directory: apps/command-center
        run: npm run typecheck
      - name: Build
        working-directory: apps/command-center
        run: npm run build
